<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 400 500"
  width="400"
  height="500"
  role="img"
  aria-label="Placeholder silhouette for Beth Collins"
>
  <!-- Background: soft sage tint matching the site palette -->
  <rect width="400" height="500" fill="#e9efe9" />

  <!-- Subtle vignette to give depth -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#eef4ee" stop-opacity="1" />
      <stop offset="100%" stop-color="#c9d8cd" stop-opacity="1" />
    </radialGradient>
  </defs>
  <rect width="400" height="500" fill="url(#vignette)" />

  <!-- Silhouette (shoulders + neck + head + soft long hairline) -->
  <g fill="#4a6e5d" opacity="0.82">
    <!-- Shoulders -->
    <path
      d="M 60 500
         C 70 430, 110 400, 150 385
         L 250 385
         C 290 400, 330 430, 340 500
         Z"
    />
    <!-- Neck -->
    <path d="M 175 385 L 175 345 L 225 345 L 225 385 Z" />
    <!-- Head + hair (single silhouette, softened for a feminine profile) -->
    <path
      d="M 200 70
         C 150 70, 115 110, 115 165
         C 115 195, 123 222, 135 240
         C 128 260, 126 295, 138 318
         C 152 340, 180 355, 200 355
         C 220 355, 248 340, 262 318
         C 274 295, 272 260, 265 240
         C 277 222, 285 195, 285 165
         C 285 110, 250 70, 200 70
         Z"
    />
  </g>

  <!-- Small label at bottom for transparency -->
  <text
    x="200"
    y="475"
    text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="14"
    font-weight="500"
    fill="#3a5a4a"
    opacity="0.65"
  >
    Photo coming soon
  </text>
</svg>
